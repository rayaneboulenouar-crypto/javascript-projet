<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Créer un compte</title>
</head>
<body id="registerBody">

  <div id="registerWrapper">
    <div id="registerCard">

      <h1 id="registerTitle">Créer un compte</h1>

      <form id="registerForm">
        <div class="field-group"><label>Nom :</label><input type="text" id="nom" required /></div>
        <div class="field-group"><label>Prénom :</label><input type="text" id="prenom" required /></div>
        <div class="field-group"><label>Âge :</label><input type="number" id="age" required /></div>
        <div class="field-group"><label>Pseudo :</label><input type="text" id="pseudo" required /></div>
        <div class="field-group"><label>Email :</label><input type="email" id="email" required /></div>
        <div class="field-group"><label>Mot de passe :</label><input type="password" id="motDePasse" required /></div>
        <div class="field-group"><label>Confirmer le mot de passe :</label><input type="password" id="confirmMotDePasse" required /></div>

        <div class="field-group">
          <label>Couleur préférée :</label>
          <select id="couleur">
            <option value="red">red</option>
            <option value="blue">blue</option>
            <option value="green">green</option>
            <option value="maroon">maroon</option>
            <option value="orange">orange</option>
            <option value="purple">purple</option>
            <option value="gray">gray</option>
          </select>
        </div>

        <div class="field-group"><label>Devise :</label><input type="text" id="devise" placeholder="ex: MAD, EUR, USD" required /></div>
        <div class="field-group"><label>Pays :</label><input type="text" id="pays" required /></div>
        <div class="field-group"><label>Avatar (URL) :</label><input type="url" id="avatar" required /></div>
        <div class="field-group"><label>Photo (URL) :</label><input type="url" id="photo" required /></div>

        <div id="adminGroup">
          <input type="checkbox" id="admin" />
          <label for="admin">Compte administrateur</label>
        </div>

        <button type="submit" id="registerBtn">Créer le compte</button>

        <ul id="registerErrorList"></ul>
        <p id="registerSuccess"></p>
      </form>

      <p id="backToLogin"><a href="login.html">Retour à la connexion</a></p>

    </div>
  </div>

  <script src="js/storage.js"></script>
  <script src="js/api.js"></script>
  <script src="js/style-register.js"></script>
  <script src="js/register.js"></script>
</body>
</html>
